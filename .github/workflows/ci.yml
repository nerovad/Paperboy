name: CI

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: Y
          MSSQL_SA_PASSWORD: Paperboy-CI-Password-2026!
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P
          Paperboy-CI-Password-2026! -C -Q 'SELECT 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Lint Ruby
        run: bundle exec rubocop

      - name: Scan Rails security
        run: bundle exec brakeman

      - name: Audit Ruby dependencies
        run: bundle exec bundle-audit check

      - name: Install system test packages
        run: sudo apt-get update && sudo apt-get install --no-install-recommends -y google-chrome-stable

      - name: Run tests
        env:
          RAILS_ENV: test
          GSABSS_HOST: localhost
          GSABSS_PORT: 1433
          GSABSS_USERNAME: sa
          GSABSS_PASSWORD: Paperboy-CI-Password-2026!
          GSABSS_DATABASE: Paperboy_Test
          PAPERBOY_TEST_DATABASE: Paperboy_Test
        run: bundle exec rake test

      - name: Keep screenshots from failed system tests
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: screenshots
          path: ${{ github.workspace }}/tmp/screenshots
          if-no-files-found: ignore
