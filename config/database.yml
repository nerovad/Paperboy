# config/database.yml

# Shared connection settings for GSABSS SQL Server
sqlserver: &sqlserver
  adapter: sqlserver
  host: <%= ENV.fetch("GSABSS_HOST") %>
  port: <%= ENV.fetch("GSABSS_PORT").to_i %>
  username: <%= ENV.fetch("GSABSS_USERNAME") %>
  password: <%= ENV.fetch("GSABSS_PASSWORD") %>
  timeout: <%= ENV.fetch("GSABSS_TIMEOUT", 5).to_i %>
  encoding: utf8
  pool: <%= ENV.fetch("RAILS_MAX_THREADS", 5) %>

# PostgreSQL config (commented out for future use):
# default: &default
#   adapter: postgresql
#   host: <%= ENV.fetch("POSTGRES_HOST", "localhost") %>
#   port: <%= ENV.fetch("POSTGRES_PORT", 5432).to_i %>
#   username: <%= ENV.fetch("POSTGRES_USERNAME", "postgres") %>
#   password: <%= ENV.fetch("POSTGRES_PASSWORD", "") %>
#   encoding: unicode
#   pool: <%= ENV.fetch("RAILS_MAX_THREADS", 5) %>

# Primary connection: Paperboy-specific database for form submissions, etc.
development:
  <<: *sqlserver
  database: <%= ENV.fetch("PAPERBOY_DATABASE", "Paperboy_Dev") %>

test:
  <<: *sqlserver
  database: <%= ENV.fetch("PAPERBOY_DATABASE", "Paperboy_Dev") %>

staging:
  <<: *sqlserver
  database: <%= ENV.fetch("PAPERBOY_DATABASE", "Paperboy_Stage") %>

production:
  <<: *sqlserver
  database: <%= ENV.fetch("PAPERBOY_DATABASE", "Paperboy_Prod") %>

# Shared GSABSS tables (Employees, Groups, Employee_Groups, Group_Permissions)
# Read-only reference data owned by the org, not Paperboy
gsabss:
  <<: *sqlserver
  database: <%= ENV.fetch("GSABSS_DATABASE", "GSABSS") %>

# MSSQL connection for billing stored procedures (TC60, Invoices)
# Same DB server, separate connection pool
billing:
  <<: *sqlserver
  database: <%= ENV.fetch("GSABSS_DATABASE", "GSABSS") %>
  azure: false
